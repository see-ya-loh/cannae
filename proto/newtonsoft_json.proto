syntax = "proto3";

package Newtonsoft.Json;

enum ConstructorHandling {
  Default = 0;
  AllowNonPublicDefaultConstructor = 1;
}

enum DateFormatHandling {
  IsoDateFormat = 0;
  MicrosoftDateFormat = 1;
}

enum DateParseHandling {
  None = 0;
  DateTime = 1;
  DateTimeOffset = 2;
}

enum DateTimeZoneHandling {
  Local = 0;
  Utc = 1;
  Unspecified = 2;
  RoundtripKind = 3;
}

enum DefaultValueHandling {
  Include = 0;
  Ignore = 1;
  Populate = 2;
  IgnoreAndPopulate = 3;
}

enum FloatFormatHandling {
  String = 0;
  Symbol = 1;
  DefaultValue = 2;
}

enum FloatParseHandling {
  Double = 0;
  Decimal = 1;
}

enum Formatting {
  None = 0;
  Indented = 1;
}

enum JsonContainerType {
  None = 0;
  Object = 1;
  Array = 2;
  Constructor = 3;
}

enum JsonToken {
  None = 0;
  StartObject = 1;
  StartArray = 2;
  StartConstructor = 3;
  PropertyName = 4;
  Comment = 5;
  Raw = 6;
  Integer = 7;
  Float = 8;
  String = 9;
  Boolean = 10;
  Null = 11;
  Undefined = 12;
  EndObject = 13;
  EndArray = 14;
  EndConstructor = 15;
  Date = 16;
  Bytes = 17;
}

enum MemberSerialization {
  OptOut = 0;
  OptIn = 1;
  Fields = 2;
}

enum MetadataPropertyHandling {
  Default = 0;
  ReadAhead = 1;
  Ignore = 2;
}

enum MissingMemberHandling {
  Ignore = 0;
  Error = 1;
}

enum NullValueHandling {
  Include = 0;
  Ignore = 1;
}

enum ObjectCreationHandling {
  Auto = 0;
  Reuse = 1;
  Replace = 2;
}

enum PreserveReferencesHandling {
  None = 0;
  Objects = 1;
  Arrays = 2;
  All = 3;
}

enum ReadType {
  Read = 0;
  ReadAsInt32 = 1;
  ReadAsInt64 = 2;
  ReadAsBytes = 3;
  ReadAsString = 4;
  ReadAsDecimal = 5;
  ReadAsDateTime = 6;
  ReadAsDateTimeOffset = 7;
  ReadAsDouble = 8;
  ReadAsBoolean = 9;
}

enum ReferenceLoopHandling {
  Error = 0;
  Ignore = 1;
  Serialize = 2;
}

enum Required {
  Default = 0;
  AllowNull = 1;
  Always = 2;
  DisallowNull = 3;
}

enum StringEscapeHandling {
  Default = 0;
  EscapeNonAscii = 1;
  EscapeHtml = 2;
}

enum TypeNameAssemblyFormatHandling {
  Simple = 0;
  Full = 1;
}

enum TypeNameHandling {
  None = 0;
  Objects = 1;
  Arrays = 2;
  All = 3;
  Auto = 4;
}

enum WriteState {
  Error = 0;
  Closed = 1;
  Object = 2;
  Array = 3;
  Constructor = 4;
  Property = 5;
  Start = 6;
}
