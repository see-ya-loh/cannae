syntax = "proto3";

package Newtonsoft.Json.Linq;

enum CommentHandling {
  Ignore = 0;
  Load = 1;
}

enum DuplicatePropertyNameHandling {
  Replace = 0;
  Ignore = 1;
  Error = 2;
}

enum JTokenType {
  None = 0;
  Object = 1;
  Array = 2;
  Constructor = 3;
  Property = 4;
  Comment = 5;
  Integer = 6;
  Float = 7;
  String = 8;
  Boolean = 9;
  Null = 10;
  Undefined = 11;
  Date = 12;
  Raw = 13;
  Bytes = 14;
  Guid = 15;
  Uri = 16;
  TimeSpan = 17;
}

enum LineInfoHandling {
  Ignore = 0;
  Load = 1;
}
