  CurrentUser = 1;
  LocalMachine = 2;
}

enum StoreName {
  StoreName_UNSPECIFIED = 0;
  AddressBook = 1;
  AuthRoot = 2;
  CertificateAuthority = 3;
  Disallowed = 4;
  My = 5;
  Root = 6;
  TrustedPeople = 7;
  TrustedPublisher = 8;
}

enum X500DistinguishedNameFlags {
  None = 0;
  Reversed = 1;
  UseSemicolons = 16;
  DoNotUsePlusSign = 32;
  DoNotUseQuotes = 64;
  UseCommas = 128;
  UseNewLines = 256;
  UseUTF8Encoding = 4096;
  UseT61Encoding = 8192;
  ForceUTF8Encoding = 16384;
}

enum X509ChainStatusFlags {
  NoError = 0;
  NotTimeValid = 1;
  NotTimeNested = 2;
  Revoked = 4;
  NotSignatureValid = 8;
  NotValidForUsage = 16;
  UntrustedRoot = 32;
  RevocationStatusUnknown = 64;
  Cyclic = 128;
  InvalidExtension = 256;
