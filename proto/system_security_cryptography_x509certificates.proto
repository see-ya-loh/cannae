syntax = "proto3";

package System.Security.Cryptography.X509Certificates;

enum OpenFlags {
  ReadOnly = 0;
  ReadWrite = 1;
  MaxAllowed = 2;
  OpenExistingOnly = 4;
  IncludeArchived = 8;
}

enum StoreLocation {
