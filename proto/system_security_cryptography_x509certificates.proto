  SerializedCert = 2;
  Pfx = 3;
  // alias: Pkcs12 = 3;
  SerializedStore = 4;
  Pkcs7 = 5;
  Authenticode = 6;
}

enum X509FindType {
  FindByThumbprint = 0;
  FindBySubjectName = 1;
  FindBySubjectDistinguishedName = 2;
  FindByIssuerName = 3;
  FindByIssuerDistinguishedName = 4;
  FindBySerialNumber = 5;
  FindByTimeValid = 6;
  FindByTimeNotYetValid = 7;
