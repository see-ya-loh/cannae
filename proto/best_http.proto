syntax = "proto3";

package Best.HTTP;

enum HTTPMethods {
  Get = 0;
  Head = 1;
  Post = 2;
  Put = 3;
  Delete = 4;
  Patch = 5;
  Trace = 6;
  Merge = 7;
  Options = 8;
  Connect = 9;
  Query = 10;
}

enum HTTPRequestStates {
  Initial = 0;
  Queued = 1;
  Processing = 2;
  Finished = 3;
  Error = 4;
  Aborted = 5;
  ConnectionTimedOut = 6;
  TimedOut = 7;
}
