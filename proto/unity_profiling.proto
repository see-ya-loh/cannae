syntax = "proto3";

package Unity.Profiling;

enum ProfilerCategoryColor {
  Render = 0;
  Scripts = 1;
  BurstJobs = 2;
  Other = 3;
  Physics = 4;
  Animation = 5;
  Audio = 6;
  AudioJob = 7;
  AudioUpdateJob = 8;
  Lighting = 9;
  GC = 10;
  VSync = 11;
  Memory = 12;
  Internal = 13;
  UI = 14;
  Build = 15;
  Input = 16;
}

enum ProfilerCounterOptions {
  None = 0;
  FlushOnEndOfFrame = 2;
  ResetToZeroOnFlush = 4;
}

enum ProfilerMarkerDataUnit {
  Undefined = 0;
  TimeNanoseconds = 1;
  Bytes = 2;
  Count = 3;
  Percent = 4;
  FrequencyHz = 5;
}
