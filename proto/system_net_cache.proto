syntax = "proto3";

package System.Net.Cache;

enum HttpRequestCacheLevel {
  Default = 0;
  BypassCache = 1;
  CacheOnly = 2;
  CacheIfAvailable = 3;
  Revalidate = 4;
  Reload = 5;
  NoCacheNoStore = 6;
  CacheOrNextCacheOnly = 7;
  Refresh = 8;
}

enum RequestCacheLevel {
  Default = 0;
  BypassCache = 1;
  CacheOnly = 2;
  CacheIfAvailable = 3;
  Revalidate = 4;
  Reload = 5;
  NoCacheNoStore = 6;
}
