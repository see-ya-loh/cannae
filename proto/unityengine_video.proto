syntax = "proto3";

package UnityEngine.Video;

enum Video3DLayout {
  No3D = 0;
  SideBySide3D = 1;
  OverUnder3D = 2;
}

enum VideoAspectRatio {
  NoScaling = 0;
  FitVertically = 1;
  FitHorizontally = 2;
  FitInside = 3;
  FitOutside = 4;
  Stretch = 5;
}

enum VideoAudioOutputMode {
  None = 0;
  AudioSource = 1;
  Direct = 2;
  APIOnly = 3;
}

enum VideoRenderMode {
  CameraFarPlane = 0;
  CameraNearPlane = 1;
  RenderTexture = 2;
  MaterialOverride = 3;
  APIOnly = 4;
}

enum VideoSource {
  VideoClip = 0;
  Url = 1;
}

enum VideoTimeReference {
  Freerun = 0;
  InternalTime = 1;
  ExternalTime = 2;
}

enum VideoTimeSource {
  AudioDSPTimeSource = 0;
  GameTimeSource = 1;
}

enum VideoTimeUpdateMode {
  DSPTime = 0;
  GameTime = 1;
  UnscaledGameTime = 2;
}
