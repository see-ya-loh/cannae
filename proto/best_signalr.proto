syntax = "proto3";

package Best.SignalR;

enum ConnectionStates {
  Initial = 0;
  Authenticating = 1;
  Negotiating = 2;
  Redirected = 3;
  Reconnecting = 4;
  Connected = 5;
  CloseInitiated = 6;
  Closed = 7;
}

enum TransferModes {
  Binary = 0;
  Text = 1;
}

enum TransportEvents {
  SelectedToConnect = 0;
  FailedToConnect = 1;
  Connected = 2;
  Closed = 3;
  ClosedWithError = 4;
}

enum TransportStates {
  Initial = 0;
  Connecting = 1;
  Connected = 2;
  Closing = 3;
  Failed = 4;
  Closed = 5;
}

enum TransportTypes {
  WebSocket = 0;
  LongPolling = 1;
}
