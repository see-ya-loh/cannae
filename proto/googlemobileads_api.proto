syntax = "proto3";

package GoogleMobileAds.Api;

enum AdChoicesPlacement {
  TopRightCorner = 0;
  TopLeftCorner = 1;
  BottomRightCorner = 2;
  BottomLeftCorner = 3;
}

enum AdPosition {
  Top = 0;
  Bottom = 1;
  TopLeft = 2;
  TopRight = 3;
  BottomLeft = 4;
  BottomRight = 5;
  Center = 6;
}

enum AdapterState {
  NotReady = 0;
  Ready = 1;
}

enum MediaAspectRatio {
  Unknown = 0;
  Any = 1;
  Landscape = 2;
  Portrait = 3;
  Square = 4;
}

enum NativeTemplateFontStyle {
  Normal = 0;
  Bold = 1;
  Italic = 2;
  Monospace = 3;
}

enum Orientation {
  Current = 0;
  Landscape = 1;
  Portrait = 2;
}

enum PublisherPrivacyPersonalizationState {
  Default = 0;
  Enabled = 1;
  Disabled = 2;
}

enum TagForChildDirectedTreatment {
  False = 0;
  Unspecified = -1;
  True = 1;
}

enum TagForUnderAgeOfConsent {
  False = 0;
  Unspecified = -1;
  True = 1;
}
